# Big4Bot - Consulting Skill Dependency Graph
# Defines domain-level progression and skill-level trigger chains
# for structured AI agent reasoning across consulting frameworks.

version: "1.1"
last_updated: "2026-03-08"

# Entry points: problem classification layer for diagnostic reasoning.
# Agents classify a problem and select the most appropriate starting frameworks.

entry_points:
  strategic_problem:
    description: Problems related to company direction, positioning, growth strategy or long-term objectives.
    start_with:
      - pestle-analysis
      - swot-analysis
      - balanced-scorecard
      - okr-design

  market_problem:
    description: Problems related to customers, market segmentation, competition or demand.
    start_with:
      - market-segmentation
      - competitive-positioning
      - customer-journey-mapping

  product_problem:
    description: Problems involving product value, product-market fit, feature prioritization or innovation.
    start_with:
      - product-discovery
      - value-proposition-canvas
      - product-market-fit-diagnostics

  operational_problem:
    description: Problems related to delivery processes, efficiency, governance or execution.
    start_with:
      - process-mapping
      - agile-operating-model
      - raci-daci-governance

  financial_problem:
    description: Problems related to profitability, financial health, capital efficiency or valuation.
    start_with:
      - financial-ratio-analysis
      - dupont-analysis
      - unit-economics

  risk_problem:
    description: Problems involving compliance exposure, operational risk or governance failures.
    start_with:
      - risk-register
      - capability-maturity-assessment

  culture_problem:
    description: Problems related to leadership, organizational culture or employee engagement.
    start_with:
      - ocai-culture-assessment
      - competing-values-framework
      - pulse-surveys

# Domain graph: macro reasoning flow between consulting domains.
# Agents traverse this graph as they move through a diagnostic engagement.

domains:
  strategy:
    description: Strategic positioning and long-term direction analysis.
    next:
      - market-customer
      - finance-valuation

  market-customer:
    description: Market dynamics, segmentation, customer behavior and positioning.
    next:
      - product-innovation
      - finance-valuation

  product-innovation:
    description: Product strategy, innovation frameworks and product-market fit.
    next:
      - execution
      - finance-valuation

  execution:
    description: Operational processes, delivery frameworks and governance.
    next:
      - finance-valuation
      - organization-culture

  finance-valuation:
    description: Financial performance, profitability and valuation analysis.
    next:
      - risk-governance
      - strategy

  risk-governance:
    description: Risk identification, controls and governance analysis.
    next:
      - organization-culture
      - strategy

  organization-culture:
    description: Organizational design, leadership and cultural transformation.
    next:
      - strategy
      - execution

